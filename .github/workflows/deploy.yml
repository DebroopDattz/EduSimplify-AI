name: EduSimplify AI – CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Backend Tests ────────────────────────────────────────────────────
  test-backend:
    name: "🐍 Test Backend (pytest)"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          APP_ENV: test
          APP_SECRET_KEY: test_secret_key_ci
          REDIS_URL: redis://localhost:6379/0
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
          IBM_WATSONX_URL: https://us-south.ml.cloud.ibm.com
          IBM_WATSONX_MODEL_ID: ibm/granite-13b-chat-v2
          IBM_WATSONX_EMBED_MODEL_ID: ibm/slate-30m-english-rtrvr
          IBM_COS_API_KEY: ${{ secrets.IBM_COS_API_KEY }}
          IBM_COS_INSTANCE_CRN: ${{ secrets.IBM_COS_INSTANCE_CRN }}
          IBM_COS_ENDPOINT: https://s3.us-south.cloud-object-storage.appdomain.cloud
          IBM_COS_BUCKET_NAME: edusimplify-test
          IBM_CLOUDANT_URL: ${{ secrets.IBM_CLOUDANT_URL }}
          IBM_CLOUDANT_API_KEY: ${{ secrets.IBM_CLOUDANT_API_KEY }}
          IBM_CLOUDANT_DB_NAME: edusimplify-test
          CHROMA_PERSIST_DIRECTORY: /tmp/chroma_test
          CHROMA_COLLECTION_NAME: test_collection
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Job 2: Frontend Tests ───────────────────────────────────────────────────
  test-frontend:
    name: "⚛️ Test Frontend (Jest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: EduSimplify AI
        run: npm test -- --watchAll=false --passWithNoTests --coverage

      - name: Build (smoke test)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: EduSimplify AI
          NEXT_PUBLIC_IBM_APPID_CLIENT_ID: test_client_id
          NEXT_PUBLIC_IBM_APPID_DISCOVERY_ENDPOINT: https://example.com/.well-known/openid-configuration
          NEXT_PUBLIC_IBM_APPID_REDIRECT_URI: http://localhost:3000/callback
          NEXT_PUBLIC_MAX_UPLOAD_MB: "50"
          NEXT_PUBLIC_SUPPORTED_LANGUAGES: English,Hindi
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next
          retention-days: 1

  # ── Job 3: Deploy Frontend to Vercel ───────────────────────────────────────
  deploy-frontend:
    name: "🚀 Deploy Frontend → Vercel"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-frontend
      url: https://edusimplify.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build project artifacts
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel production
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ── Job 4: Deploy Backend to Render ────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend → Render"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-backend
      url: https://edusimplify-backend.onrender.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook response: $response"
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "❌ Deploy hook failed with status $response"
            exit 1
          fi
          echo "✅ Render deploy triggered successfully"

      - name: Wait for Render deployment to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Waiting for deployment to become live..."
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null || echo "unknown")
            echo "Attempt $i/20 – status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deployment is live!"
              exit 0
            fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
          done
          echo "⚠️ Timed out waiting for deployment"
          exit 1
